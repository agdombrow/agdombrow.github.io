---
layout: default
---

<div class="page blog-index">

  <h1>Fear the Fin: Sharks in Myth and Media</h1>
  
  <div class="col-2 blog-cols">
    <div class="col col-aside blog-recent">
      
      <h4>Recent Posts</h4>
      
      <ul class="blog-title-list">
        {% for post in site.posts offset:2 limit:5 %}
          <li>
            <a href="{{ post.url }}">{{ post.title }}</a>
            <span>Posted: {{ post.date | date: "%B %d, %Y" }}</span>
          </li>
        {% endfor %}
      </ul>
    </div>
    
    <div class="col col-content blog-previews">
      {% for post in site.posts limit:2 %}
        {% include post-excerpt.html %}
      {% endfor %}
    </div>

  </div>
</div>
