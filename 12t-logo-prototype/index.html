<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>12T Logo Prototype</title>
  <link href="./styles/main.css" rel="stylesheet">
  <link href="./styles/logo.css" rel="stylesheet">
</head>
<body>
  <header>
    <h1>12T Logo Animation Prototype/Demo</h1>
    <!-- <p>(Not production code.)</p> -->
  </header>

  <main>
    <h2>Options</h2>
    <input type="checkbox" id="uppercase">&nbsp;
    <label for="uppercase">Uppercase</label>
    <input type="checkbox" id="stem" checked>&nbsp;
    <label for="stem">Stem placeholder</label>

    <h2>Font Weight</h2>
    <input type="radio" name="weight" id="fw-100" checked>&nbsp;<label for="fw-100">100</label>
    <input type="radio" name="weight" id="fw-200" checked>&nbsp;<label for="fw-200">200</label>
    <input type="radio" name="weight" id="fw-300" checked>&nbsp;<label for="fw-300">300</label>
    <input type="radio" name="weight" id="fw-400" checked>&nbsp;<label for="fw-400">400</label>
    <input type="radio" name="weight" id="fw-500">&nbsp;<label for="fw-500">500</label>
    <input type="radio" name="weight" id="fw-600">&nbsp;<label for="fw-600">600</label>
    <input type="radio" name="weight" id="fw-700">&nbsp;<label for="fw-700">700</label>
    <input type="radio" name="weight" id="fw-800">&nbsp;<label for="fw-800">800</label>
    <input type="radio" name="weight" id="fw-900">&nbsp;<label for="fw-900">900</label>

    <h2>Font Family</h2>
    <input type="radio" name="family" id="baloo2" checked>
      <label for="baloo2" class="baloo2">Baloo&nbsp;Da&nbsp;2</label>
    <input type="radio" name="family" id="firasans">
      <label for="firasans" class="firasans">Fira&nbsp;Sans</label>
    <input type="radio" name="family" id="firasans-cd">
      <label for="firasans-cd" class="firasans">Fira&nbsp;Sans&nbsp;Condensed</label>
    <input type="radio" name="family" id="rubik">
      <label for="rubik" class="rubik">Rubik</label>
    <input type="radio" name="family" id="nunito">
      <label for="nunito" class="nunito">Nunito</label>
    <input type="radio" name="family" id="ubuntu">
      <label for="ubuntu" class="ubuntu">Ubuntu</label>

    <hr>

    <p class="logotype">
      <span class="twelve">12</span>&nbsp;
      <span class="letter t1">T</span>
      <span class="letter o1">o</span>
      <span class="letter m">m</span>
      <span class="letter a">a</span>
      <span class="letter t2">t</span>
      <span class="letter o2">o</span>
      <span class="letter e">e</span>
      <span class="letter s">s</span>
      <div class="stem"></div>
    </p>
    <p class="center"><em>* Increase/decrease viewport to trigger animation. For illustrative purposes only.</em></p>


  </main>

  <footer>
    <!-- <hr>
    <p>&copy; 2009–2020, site design and contents by august dombrow, except where noted</p> -->
  </footer>

  <script src="./scripts/logo.js"></script>
</body>
</html>
